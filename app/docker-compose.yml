  postgres_db:
    image: postgres:16
    container_name: postgres_db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=pguser
      - POSTGRES_PASSWORD=pgpassword
      - POSTGRES_DB=inventory_pg
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d inventory_pg"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    depends_on:
      mysql_db:
        condition: service_healthy
    build:
      context: .
    container_name: app_service
    working_dir: /app
    volumes:
      - ./:/app
    command: python app.py
    ports:
      - "7500:7500"
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=mysql_db
      - DB_PORT=3306
      - DB_USER=appuser
      - DB_PASSWORD=apppassword
      - DB_NAME=inventory

