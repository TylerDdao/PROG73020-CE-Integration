<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Farm2Fork</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg, #f8faf7);
    }

    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      padding: 2.4rem 2rem;
      width: 100%;
      max-width: 400px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .login-logo h1 {
      font-size: 1.6rem;
      color: var(--green, #2e7d32);
      margin-bottom: 0.2rem;
    }

    .login-logo p {
      font-family: Arial, sans-serif;
      font-size: 0.85rem;
      color: var(--muted, #888);
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-label {
      display: block;
      font-family: Arial, sans-serif;
      font-size: 0.82rem;
      font-weight: bold;
      color: var(--text, #222);
      margin-bottom: 0.4rem;
    }

    .form-input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1.5px solid var(--border, #ddd);
      border-radius: 6px;
      font-family: Arial, sans-serif;
      font-size: 0.9rem;
      color: var(--text, #222);
      box-sizing: border-box;
      transition: border-color 0.15s;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--green, #2e7d32);
    }

    .error-banner {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      padding: 0.65rem 0.9rem;
      font-family: Arial, sans-serif;
      font-size: 0.83rem;
      color: #b91c1c;
      margin-bottom: 1.2rem;
    }

    .login-btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--green, #2e7d32);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: Arial, sans-serif;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.4rem;
    }

    .login-btn:hover {
      background: var(--green-dark, #1b5e20);
    }

    .login-hint {
      text-align: center;
      font-family: Arial, sans-serif;
      font-size: 0.78rem;
      color: var(--muted, #888);
      margin-top: 1.2rem;
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <h1>Farm2Fork</h1>
        <p>Sign in with your Community Program account</p>
      </div>

      {% if error %}
        <div class="error-banner">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label class="form-label" for="client_id">Client ID</label>
          <input
            class="form-input"
            type="text"
            id="client_id"
            name="client_id"
            placeholder="e.g. S297"
            autocomplete="username"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="mobile">Mobile Number</label>
          <input
            class="form-input"
            type="password"
            id="mobile"
            name="mobile"
            placeholder="Enter your mobile number"
            autocomplete="current-password"
            required
          />
        </div>
        <button class="login-btn" type="submit">Sign In</button>
      </form>

      <p class="login-hint">Use your Client ID and mobile number from your C&amp;S subscription.</p>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <script src="/static/components.js"></script>
</body>
</html>
