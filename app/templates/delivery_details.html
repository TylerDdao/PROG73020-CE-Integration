<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Details</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background: #f7f7f7; }
        .box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            margin-right: 10px;
            padding: 8px 12px;
            background: #2f6b2f;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Delivery Details</h1>
        <p><strong>Order ID:</strong> {{ delivery.order_id }}</p>
        <p><strong>Destination:</strong> {{ delivery.destination_address }}</p>
        <p><strong>Status:</strong> {{ delivery.status }}</p>
        <p><strong>Driver:</strong> {{ delivery.driver }}</p>
        <p><strong>Needs Signature:</strong> {{ delivery.needs_signature }}</p>

        <a class="btn" href="/delivery">Back to Dashboard</a>
        <a class="btn" href="/">Back to Home</a>
    </div>
</body>
</html>
